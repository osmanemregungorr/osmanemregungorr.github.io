<svg width="1000" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- Arka plan rengi -->
  <rect width="100%" height="100%" fill="transparent"/>

  <!-- Merkez: Arduino Uno -->
  <rect x="350" y="225" width="300" height="150" rx="20" ry="20" fill="#f5f0e8" stroke="#e0dcd5" stroke-width="2"/>
  <text x="500" y="305" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Arduino Uno</text>

  <!-- Sensörler (Üst Grup) -->
  <rect x="150" y="50" width="120" height="50" rx="10" fill="#e8f5e9" stroke="#c8e6c9" stroke-width="1"/>
  <text x="210" y="80" font-family="Arial" font-size="12" text-anchor="middle" fill="#2e7d32">DHT22 (Sıcaklık/Nem)</text>
  <path d="M210,100 L400,225" stroke="#c8e6c9" stroke-width="2" fill="none"/>

  <rect x="440" y="50" width="120" height="50" rx="10" fill="#fff3e0" stroke="#ffe0b2" stroke-width="1"/>
  <text x="500" y="80" font-family="Arial" font-size="12" text-anchor="middle" fill="#ef6c00">MQ-135 (Gaz)</text>
  <path d="M500,100 L500,225" stroke="#ffe0b2" stroke-width="2" fill="none"/>

  <rect x="730" y="50" width="120" height="50" rx="10" fill="#e3f2fd" stroke="#bbdefb" stroke-width="1"/>
  <text x="790" y="80" font-family="Arial" font-size="12" text-anchor="middle" fill="#1565c0">LDR (Işık)</text>
  <path d="M790,100 L600,225" stroke="#bbdefb" stroke-width="2" fill="none"/>

  <!-- Çıkış Birimleri (Alt Grup) -->
  <rect x="250" y="450" width="120" height="50" rx="10" fill="#fce4ec" stroke="#f8bbd0" stroke-width="1"/>
  <text x="310" y="480" font-family="Arial" font-size="12" text-anchor="middle" fill="#c2185b">OLED Ekran</text>
  <path d="M310,450 L450,375" stroke="#f8bbd0" stroke-width="2" fill="none"/>

  <rect x="630" y="450" width="120" height="50" rx="10" fill="#efebe9" stroke="#d7ccc8" stroke-width="1"/>
  <text x="690" y="480" font-family="Arial" font-size="12" text-anchor="middle" fill="#5d4037">RGB LED &amp; Buzzer</text>
  <path d="M690,450 L550,375" stroke="#d7ccc8" stroke-width="2" fill="none"/>
</svg>
