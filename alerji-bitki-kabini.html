<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">   
    <title>Alerji & Bitki İzolasyon Kabini</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .lang-switch { text-align: right; margin-bottom: 20px; }
        .lang-switch button { background: #333; border: 1px solid #fff; color: #fff; cursor: pointer; padding: 5px 10px; margin-left: 5px; }
        .code-container { background-color: #272822; color: #f8f8f2; padding: 20px; border-radius: 8px; overflow-x: auto; max-height: 400px; font-family: 'Courier New', monospace; font-size: 13px; line-height: 1.5; margin: 20px 0; }
        
        /* Animasyon */
        .scroll-reveal { opacity: 0; filter: blur(5px); transform: translateY(30px); transition: all 1s; }
        .scroll-reveal.active { opacity: 1; filter: blur(0); transform: translateY(0); }
    </style>
</head>
<body>
    <div class="container">
        <div class="lang-switch">
            <button onclick="setLanguage('tr')">TR</button>
            <button onclick="setLanguage('en')">EN</button>
        </div>

        <h1 class="scroll-reveal i18n" data-key="baslik">Alerji ve Bitki İzolasyon Kabini - ESP32</h1>
        
        <h3 class="scroll-reveal i18n" data-key="amac_baslik">Giriş ve Proje Amacı</h3>
        <p class="scroll-reveal i18n" data-key="amac_metin">Bitkilerin en sağlıklı şekilde gelişmesini sağlarken, kullanıcı sağlığını alerjen korumasıyla ön planda tutan, ESP32 tabanlı otonom bir izolasyon kabinidir.</p>

        <!-- Diğer bölümler için aynı yapıyı kullanabilirsin -->
        <a href="index.html" class="scroll-reveal i18n" data-key="geri_don">← Ana Sayfaya Dön</a>
    </div>

    <script>
        const translations = {
            "tr": {
                "baslik": "Alerji ve Bitki İzolasyon Kabini - ESP32",
                "amac_baslik": "Giriş ve Proje Amacı",
                "amac_metin": "Bitkilerin en sağlıklı şekilde gelişmesini sağlarken, kullanıcı sağlığını alerjen korumasıyla ön planda tutan, ESP32 tabanlı otonom bir izolasyon kabinidir.",
                "geri_don": "Ana Sayfaya Dön"
            },
            "en": {
                "baslik": "Allergy & Plant Isolation Chamber - ESP32",
                "amac_baslik": "Introduction and Project Objective",
                "amac_metin": "An ESP32-based autonomous isolation chamber that ensures the healthiest plant growth while prioritizing user health through allergen protection.",
                "geri_don": "Back to Home"
            }
        };

        function setLanguage(lang) {
            document.querySelectorAll('.i18n').forEach(el => {
                const key = el.getAttribute('data-key');
                if (translations[lang][key]) el.innerText = translations[lang][key];
            });
            localStorage.setItem('lang', lang);
        }

        // Animasyon ve Dil Ayarı
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('active'); });
        });
        
        document.addEventListener('DOMContentLoaded', () => {
            setLanguage(localStorage.getItem('lang') || 'tr');
            document.querySelectorAll('.scroll-reveal').forEach((el) => observer.observe(el));
        });
    </script>
</body>
</html>
