<svg width="1000" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- Arka plan rengi (web sitenle uyumlu şeffaf siyahlık için) -->
  <rect width="100%" height="100%" fill="transparent"/>

  <!-- Orta: Arduino Uno Dikdörtgeni (daha yumuşak köşeler) -->
  <rect x="250" y="150" width="500" height="300" rx="20" ry="20" fill="#f5f0e8" stroke="#e0dcd5" stroke-width="2"/>
  <text x="500" y="310" font-family="Arial, sans-serif" font-size="18" font-weight="bold" text-anchor="middle" fill="#1a1a1a">Arduino Uno</text>

  <!-- USB portu -->
  <rect x="220" y="250" width="30" height="50" rx="5" ry="5" fill="#ddd"/>
  <!-- Güç jakı -->
  <circle cx="235" cy="350" r="20" fill="#ddd"/>

  <!-- Pin İşaretleyicileri (Üst Sıra) -->
  <!-- Koduna göre: D2, A0, A1, D9, D10, D11, D6 -->
  <!-- D2 (DHT22) -->
  <circle cx="300" cy="150" r="6" fill="#34a853"/><text x="300" y="120" font-family="Arial" font-size="12" text-anchor="middle" fill="#888">D2 · DHT22</text>
  <!-- A0 (LDR) -->
  <circle cx="360" cy="150" r="6" fill="#4285f4"/><text x="360" y="120" font-family="Arial" font-size="12" text-anchor="middle" fill="#888">A0 · LDR</text>
  <!-- A1 (MQ-135) -->
  <circle cx="420" cy="150" r="6" fill="#fbbc05"/><text x="420" y="120" font-family="Arial" font-size="12" text-anchor="middle" fill="#888">A1 · MQ-135</text>
  <!-- D9, D10, D11 (RGB) -->
  <circle cx="480" cy="150" r="6" fill="#ea4335"/><text x="480" y="120" font-family="Arial" font-size="12" text-anchor="middle" fill="#888">D9/10/11 · RGB</text>
  <!-- D6 (Buzzer) -->
  <circle cx="540" cy="150" r="6" fill="#9c27b0"/><text x="540" y="120" font-family="Arial" font-size="12" text-anchor="middle" fill="#888">D6 · Buzzer</text>

  <!-- Pin İşaretleyicileri (Alt Sıra) -->
  <!-- Koduna göre: 5V, GND, SDA (A4), SCL (A5) -->
  <!-- 5V -->
  <circle cx="400" cy="450" r="6" fill="#888"/><text x="400" y="480" font-family="Arial" font-size="12" text-anchor="middle" fill="#888">5V · Güç</text>
  <!-- GND -->
  <circle cx="460" cy="450" r="6" fill="#333"/><text x="460" y="480" font-family="Arial" font-size="12" text-anchor="middle" fill="#888">GND · Güç</text>
  
  <!-- I2C Ekran için A4 ve A5'i daha belirgin ve ayrı gösterelim -->
  <!-- A4 (SDA) -->
  <circle cx="620" cy="450" r="8" fill="#00bcd4"/>
  <path d="M620,450 L620,520 L680,520" stroke="#00bcd4" stroke-width="1" fill="none"/>
  <text x="690" y="525" font-family="Arial" font-size="12" fill="#00bcd4" font-weight="bold">A4 · SDA (OLED)</text>
  
  <!-- A5 (SCL) -->
  <circle cx="680" cy="450" r="8" fill="#00bcd4"/>
  <path d="M680,450 L680,550 L750,550" stroke="#00bcd4" stroke-width="1" fill="none"/>
  <text x="760" y="555" font-family="Arial" font-size="12" fill="#00bcd4" font-weight="bold">A5 · SCL (OLED)</text>
</svg>
